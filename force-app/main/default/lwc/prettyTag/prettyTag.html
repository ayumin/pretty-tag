<template>
    <div class="slds-form-element slds-form-element_stacked">
        <template if:true={label}>
            <label class="slds-form-element__label">{label}</label>
        </template>
        <div class="slds-form-element__control">
            <div class="slds-form-element__static">
                <div class="tag-container">
                    <template for:each={tagItems} for:item="tag">
                        <span key={tag.id} class={tag.colorClass} title="クリックで削除">
                            {tag.label}
                            <button
                                class="tag-remove-btn"
                                data-value={tag.value}
                                onclick={removeTag}
                                aria-label="削除">✕</button>
                        </span>
                    </template>
                    <template if:true={hasOptions}>
                        <template if:false={_showDropdown}>
                            <button class="add-tag-btn" onclick={toggleDropdown}>＋ タグを追加</button>
                        </template>
                        <template if:true={_showDropdown}>
                            <lightning-combobox
                                label=""
                                placeholder="タグを選択..."
                                value=""
                                options={availableOptions}
                                onchange={addTag}
                                variant="label-hidden">
                            </lightning-combobox>
                        </template>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>
